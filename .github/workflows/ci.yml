name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: quality
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: marketplace_test
          MYSQL_USER: app
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_ENV: test
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 3306
      DATABASE_USER: app
      DATABASE_PASSWORD: secret
      DATABASE_NAME: marketplace_test
      TEST_DB_HOST: 127.0.0.1
      TEST_DB_PORT: 3306
      TEST_DB_USER: app
      TEST_DB_PASSWORD: secret
      TEST_DB_NAME: marketplace_test
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      TEST_REDIS_HOST: 127.0.0.1
      TEST_REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ci-access-secret-01234567890123456789
      JWT_REFRESH_SECRET: ci-refresh-secret-01234567890123456789
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run migration:run --workspace @marketplace/backend
      - run: npm run test --workspace @marketplace/backend
      - run: npm run test --workspace @marketplace/frontend

  openapi:
    runs-on: ubuntu-latest
    needs: test
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: marketplace_test
          MYSQL_USER: app
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_ENV: test
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 3306
      DATABASE_USER: app
      DATABASE_PASSWORD: secret
      DATABASE_NAME: marketplace_test
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ci-access-secret-01234567890123456789
      JWT_REFRESH_SECRET: ci-refresh-secret-01234567890123456789
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run migration:run --workspace @marketplace/backend
      - run: npm run docs:export --workspace @marketplace/backend
      - uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: backend/openapi.json
          if-no-files-found: error

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspaces
